  <body>
    <div id="root"></div>

    <script>
      // Set FullStory namespace before any FS scripts load
      window._fs_namespace = 'FS1';

      // Prevent FullStory conflicts and sandbox issues
      // Don't init analytics when inside an iframe (e.g., Builder editor)
      if (window.top !== window.self) {
        console.debug('Running in iframe/sandbox - analytics disabled');
      }

      // Guard against multiple FullStory instances
      if (window.FS && !window._fs_namespace) {
        window._fs_namespace = 'FS2'; // Set alternate namespace if FS already exists
      }
    </script>

    <script type="module" src="/client/App.tsx"></script>
  </body>
